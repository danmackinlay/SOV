# LiteLLM proxy config — Apple laptop phase 1.
#
# Committed to the repo: contains no secrets. Phase 2 will add cloud
# backends (Anthropic/OpenAI) whose api_key fields read from env vars
# via direnv (`os.environ/ANTHROPIC_API_KEY`), so this file stays
# committable.
#
# Canonical launch (from the repo root):
#
#   ./phases-apple/bin/litellm-start.sh
#
# That wrapper scopes HOST=127.0.0.1 to the litellm subprocess and
# passes --host 127.0.0.1 as belt-and-braces. The direct form below
# works too if you need a one-off; remembering --host is load-bearing.
#
#   litellm --config phases-apple/phase-1/litellm-config.yaml \
#           --host 127.0.0.1 --port 4000
#
# Why we don't export HOST in the project .envrc: LiteLLM's --host
# Click option reads an unscoped HOST env var as its default, but HOST
# is also touched by shells, ssh wrappers, and generic web tooling.
# Subprocess-scoped via the wrapper is the safe way; project-wide
# export would collide. There is no YAML-config equivalent.
#
# All three local-* aliases point at the same port 8080. bin/model-switch.sh
# is the thing that controls which actual model is loaded there; this proxy
# just provides stable client-facing names.

model_list:
  - model_name: local-small
    litellm_params:
      model: openai/mlx-community/Qwen3.5-35B-A3B-4bit
      api_base: http://127.0.0.1:8080/v1
      api_key: not-needed

  - model_name: local-math
    litellm_params:
      model: openai/mlx-community/DeepSeek-R1-0528-Qwen3-8B-4bit
      api_base: http://127.0.0.1:8080/v1
      api_key: not-needed

  - model_name: local-big
    litellm_params:
      model: openai/mlx-community/Qwen3.5-122B-A10B-4bit
      api_base: http://127.0.0.1:8080/v1
      api_key: not-needed

litellm_settings:
  drop_params: true   # silently drop unsupported params instead of erroring
